<html>

<head>
<link rel="stylesheet" href="login.css">

</head>

<body>
<div> 
   <div id="loadingScreen">
     <div class="loader"></div>
     <p>loading...</p>
   </div>
   
    <div class="floating-letters"></div>
    
<div class="login-container">
<h1 class="login-title">💌</h1>
<img src="profiee.jpg" class="profile-pic">
        

<form id="loginform">
<input type="text" id="username" class="input-field" placeholder="username"required >
<input type= "password" id="password" class="input-field" placeholder="password"required >

<button type="submit" class="login-btn" name="Submit">Submit</button><br> 
<button type="reset" class="login-btn"  name="Reset">Reset</button>
</form>
<p id="message"></p>


<script>

// Auto redirect if already logged in
if (sessionStorage.getItem("isLoggedIn") === "true") {
  window.location.href = "mess.html";
}

// Logout function (used in other page)
function logout() {
  sessionStorage.removeItem("isLoggedIn");
  window.location.href = "index.html";
}

document.getElementById("loginform").addEventListener("submit", function(event) {
  event.preventDefault();

  document.body.style.opacity = "0.5";

  const correctUsername = "prettylady@";
  const correctPassword = "082408_ladyguanaviere";

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const message = document.getElementById("message");

  if (username === correctUsername && password === correctPassword) {
    message.style.color = "green";
    message.textContent = "Login successful!";

    // Save login
    sessionStorage.setItem("isLoggedIn", "true");

    const loading = document.getElementById("loadingScreen");
    loading.classList.add("active");

    setTimeout(() => {
      window.location.href = "mess.html";
    }, 2000);

  } else {
    message.style.color = "red";
    message.textContent = "Invalid username or password.";
    document.body.style.opacity = "1"; // restore if wrong
  }
});


// Floating letters
const container = document.querySelector('.floating-letters');

function createLetter() {
  const letter = document.createElement('span');
  letter.innerHTML = "💌";

  letter.style.left = Math.random() * 100 + "vw";

  const size = Math.random() * 30 + 20;
  letter.style.fontSize = size + "px";

  const duration = Math.random() * 5 + 5;
  letter.style.animationDuration = duration + "s";

  const drift = Math.random() * 100 - 50;
  letter.style.setProperty('--drift', drift + "px");

  container.appendChild(letter);

  setTimeout(() => {
    letter.remove();
  }, duration * 1000);
}

setInterval(createLetter, 500);

</script>


</div>
</body>
</html>
